<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="920" height="470" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="460" y="34" text-anchor="middle" font-size="19" font-weight="600" fill="#1f2328">decide() picks from eligible requires clauses without scanning</text>

  <!-- eligibility definition -->
  <rect x="30" y="56" width="860" height="34" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="460" y="78" text-anchor="middle" font-size="14" fill="#1f2328">a clause is eligible when: its parent is installed, its condition holds, and no candidate is assigned true yet</text>

  <!-- trail box -->
  <rect x="30" y="130" width="200" height="120" rx="6" fill="#ffffff" stroke="#8c959f"/>
  <text x="130" y="153" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">decision trail</text>
  <text x="130" y="175" text-anchor="middle" font-size="12.5" fill="#656d76">assignments made by</text>
  <text x="130" y="191" text-anchor="middle" font-size="12.5" fill="#656d76">propagation and undone</text>
  <text x="130" y="207" text-anchor="middle" font-size="12.5" fill="#656d76">by backtracking</text>
  <text x="130" y="234" text-anchor="middle" font-size="12.5" fill="#0969da">sync(): replay net changes</text>

  <!-- arrow trail -> occurrence -->
  <line x1="230" y1="190" x2="285" y2="190" stroke="#0969da" stroke-width="2"/>
  <polygon points="285,190 275,184 275,196" fill="#0969da"/>

  <!-- occurrence lists box -->
  <rect x="290" y="116" width="320" height="190" rx="6" fill="#ffffff" stroke="#8c959f"/>
  <text x="450" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">occurrence lists (wake-ups)</text>
  <text x="306" y="166" font-size="12.5" fill="#1f2328"><tspan font-weight="600">by parent:</tspan> parent assigned true</text>
  <text x="306" y="182" font-size="12.5" fill="#656d76">&#8594; enqueue all its clauses</text>
  <text x="306" y="206" font-size="12.5" fill="#1f2328"><tspan font-weight="600">by candidate:</tspan> candidate changed</text>
  <text x="306" y="222" font-size="12.5" fill="#656d76">&#8594; invalidate cached walk; if satisfaction</text>
  <text x="306" y="238" font-size="12.5" fill="#656d76">&#160;&#160;&#160;broke, enqueue the requirement's clauses</text>
  <text x="306" y="262" font-size="12.5" fill="#1f2328"><tspan font-weight="600">by condition variable:</tspan> any change</text>
  <text x="306" y="278" font-size="12.5" fill="#656d76">&#8594; enqueue the conditional clauses</text>

  <!-- arrow occurrence -> queue -->
  <line x1="610" y1="190" x2="665" y2="190" stroke="#0969da" stroke-width="2"/>
  <polygon points="665,190 655,184 655,196" fill="#0969da"/>
  <text x="637" y="178" text-anchor="middle" font-size="11.5" fill="#0969da">insert</text>

  <!-- queue box -->
  <rect x="670" y="116" width="220" height="190" rx="6" fill="#ffffff" stroke="#8c959f"/>
  <text x="780" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">queue</text>
  <text x="780" y="157" text-anchor="middle" font-size="11.5" fill="#656d76">BTreeMap&lt;ClausePosition, clause&gt;</text>
  <!-- queue cells -->
  <g font-size="11" text-anchor="middle">
    <rect x="688" y="170" width="56" height="26" rx="4" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="716" y="187" fill="#1a7f37">(0,0)</text>
    <rect x="752" y="170" width="56" height="26" rx="4" fill="#fff8c5" stroke="#9a6700"/>
    <text x="780" y="187" fill="#9a6700">(0,1)</text>
    <rect x="816" y="170" width="56" height="26" rx="4" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="844" y="187" fill="#1a7f37">(2,0)</text>
    <rect x="688" y="202" width="56" height="26" rx="4" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="716" y="219" fill="#1a7f37">(2,3)</text>
    <rect x="752" y="202" width="56" height="26" rx="4" fill="#fff8c5" stroke="#9a6700"/>
    <text x="780" y="219" fill="#9a6700">(5,1)</text>
  </g>
  <text x="780" y="250" text-anchor="middle" font-size="11.5" fill="#1a7f37">&#9632; eligible</text>
  <text x="780" y="266" text-anchor="middle" font-size="11.5" fill="#9a6700">&#9632; stale (superset), removed lazily</text>
  <text x="780" y="282" text-anchor="middle" font-size="11.5" fill="#656d76">never holds clauses whose</text>
  <text x="780" y="296" text-anchor="middle" font-size="11.5" fill="#656d76">parent is not installed</text>

  <!-- invariant arrow -->
  <line x1="780" y1="306" x2="780" y2="340" stroke="#8c959f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="640" y="340" width="280" height="0" fill="none"/>

  <!-- bottom band: guarantees -->
  <rect x="30" y="346" width="860" height="98" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="46" y="372" font-size="13.5" font-weight="600" fill="#1f2328">Invariant: the queue always contains every eligible clause.</text>
  <text x="46" y="394" font-size="12.5" fill="#1f2328">Clauses leave only when an inspection in next_decision() proves them ineligible; every assignment change that can make</text>
  <text x="46" y="411" font-size="12.5" fill="#1f2328">an unqueued clause eligible flows through an occurrence list and re-inserts it. Debug builds verify this on every decide().</text>
  <text x="46" y="432" font-size="12.5" fill="#656d76">Propagation and backtracking are untouched: they pay one integer min per undo, nothing else.</text>
</svg>
