<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="920" height="400" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="460" y="34" text-anchor="middle" font-size="19" font-weight="600" fill="#1f2328">Catching up with the trail: the sync floor</text>
  <text x="460" y="56" text-anchor="middle" font-size="13" fill="#656d76">the trail is the solver's chronological assignment log; it only changes at its end, so two snapshots share a common prefix</text>

  <!-- axes -->
  <line x1="90" y1="330" x2="860" y2="330" stroke="#8c959f" stroke-width="1.5"/>
  <line x1="90" y1="330" x2="90" y2="80" stroke="#8c959f" stroke-width="1.5"/>
  <text x="475" y="358" text-anchor="middle" font-size="13" fill="#656d76">time between two decide() calls</text>
  <text x="40" y="205" font-size="13" fill="#656d76" transform="rotate(-90 40 205)">trail length</text>

  <!-- trail length polyline: starts at decide#1 len 6 (y=330-6*30=150)... scale 28px/unit, base y=330 -->
  <!-- points: (120,162)=len6, (300,78)=len9, (470,246)=len3, (820,106)=len8 -->
  <polyline points="120,162 300,78 470,246 820,106" fill="none" stroke="#0969da" stroke-width="2.5"/>
  <circle cx="120" cy="162" r="5" fill="#0969da"/>
  <circle cx="820" cy="106" r="5" fill="#0969da"/>
  <circle cx="470" cy="246" r="5" fill="#cf222e"/>

  <text x="120" y="142" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0969da">decide() #1</text>
  <text x="126" y="186" text-anchor="middle" font-size="11.5" fill="#656d76">mirror taken, length 6</text>
  <text x="300" y="66" text-anchor="middle" font-size="11.5" fill="#656d76">propagation pushes</text>
  <text x="820" y="86" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0969da">decide() #2</text>
  <text x="828" y="132" text-anchor="end" font-size="11.5" fill="#656d76">length 8</text>

  <!-- floor line -->
  <line x1="90" y1="246" x2="860" y2="246" stroke="#cf222e" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="560" y="268" font-size="12.5" font-weight="600" fill="#cf222e">sync floor = 3: minimum length since decide() #1</text>
  <text x="404" y="210" text-anchor="middle" font-size="11.5" fill="#656d76">backjump</text>

  <!-- brackets on the right showing replay ranges -->
  <line x1="868" y1="246" x2="868" y2="106" stroke="#1a7f37" stroke-width="2"/>
  <line x1="862" y1="246" x2="868" y2="246" stroke="#1a7f37" stroke-width="2"/>
  <line x1="862" y1="106" x2="868" y2="106" stroke="#1a7f37" stroke-width="2"/>

  <!-- left bracket mirror -->
  <line x1="108" y1="246" x2="108" y2="162" stroke="#bc4c00" stroke-width="2"/>
  <line x1="108" y1="246" x2="114" y2="246" stroke="#bc4c00" stroke-width="2"/>
  <line x1="108" y1="162" x2="114" y2="162" stroke="#bc4c00" stroke-width="2"/>

  <!-- legend / replay explanation -->
  <rect x="150" y="286" width="620" height="0" fill="none"/>
  <text x="150" y="300" font-size="12.5" fill="#bc4c00"><tspan font-weight="600">mirror[3..6]</tspan> were all undone at some point &#8594; re-route those variables</text>
  <text x="150" y="318" font-size="12.5" fill="#1a7f37"><tspan font-weight="600">trail[3..8]</tspan> are new since the floor &#8594; re-route those variables</text>

  <text x="460" y="384" text-anchor="middle" font-size="12.5" fill="#656d76">entries below the floor never changed: no work. An assignment made and undone between the two calls is never seen at all.</text>
</svg>
